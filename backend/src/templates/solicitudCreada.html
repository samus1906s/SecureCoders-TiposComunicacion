<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
</head>

<body style="font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 20px;">
    <div style="border: 1px solid #e9ecef; padding: 20px; border-radius: 8px;">
        <h2 style="color: #0d6efd; margin-top: 0;">¡Hola {{nombreCliente}}!</h2>
        <p>Tu solicitud ha sido registrada correctamente en nuestra plataforma.</p>

        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
            <p style="margin: 5px 0;"><strong>Código de Solicitud:</strong> #{{id}}</p>
            <p style="margin: 5px 0;"><strong>Asunto:</strong> {{asunto}}</p>
            <p style="margin: 5px 0;"><strong>Estado Inicial:</strong> {{estado}}</p>
        </div>

        <p>Puedes hacer el seguimiento de tu caso haciendo clic en el siguiente botón:</p>
        <a href="{{enlaceSolicitud}}" style="background: #0d6efd; color: white; padding: 10px 16px;
                  text-decoration: none; border-radius: 6px; display: inline-block; font-weight: bold;">
            Ver mi solicitud
        </a>

        <p style="margin-top: 30px; color: #6c757d; font-size: 14px; border-top: 1px solid #e9ecef; padding-top: 15px;">
            SmartNotify Solutions
        </p>
    </div>
</body>

</html>
