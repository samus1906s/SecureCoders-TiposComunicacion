<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
</head>

<body style="font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 20px;">
    <div style="border: 1px solid #e9ecef; padding: 20px; border-radius: 8px;">
        <h2 style="color: #198754; margin-top: 0;">Solicitud Finalizada</h2>
        <p>¡Buenas noticias! Tu caso con el código <strong>#{{id}}</strong> ha sido marcado como resuelto por nuestro
            personal técnico.</p>

        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
            <p style="margin: 5px 0;"><strong>Estado de cierre:</strong> {{estado}}</p>
        </div>

        <p>Por favor, ingresa para verificar la solución aplicada y cerrar formalmente el ticket:</p>
        <a href="{{enlaceSolicitud}}" style="background: #198754; color: white; padding: 10px 16px;
                  text-decoration: none; border-radius: 6px; display: inline-block; font-weight: bold;">
            Ver Solución de Caso
        </a>

        <p style="margin-top: 30px; color: #6c757d; font-size: 14px; border-top: 1px solid #e9ecef; padding-top: 15px;">
            SmartNotify Solutions
        </p>
    </div>
</body>

</html>
